<div class="box">


<h1 id="title">
Memeriksa pembayaran...
</h1>

<script>


const params =
new URLSearchParams(
window.location.search
);


const status =
params.get("status_id");



if(status==="1"){


document.getElementById("title")
.innerHTML =
"Payment Berjaya 🎉";


document.getElementById("title")
.className="success";


document.getElementById("msg")
.innerHTML =
`
Terima kasih atas pembelian anda.

<br><br>

Link akses telah dihantar melalui email ToyyibPay.

<br><br>

Sila check folder inbox atau spam.
<br><br>

Boleh hubungi admin di haafizxmedia@gmail.com jika ada sebarang pertanyaan.
`;


      // Hanya trigger Purchase jika status === 1
      fbq('track', 'Purchase', {
        value: 39.00,
        currency: 'MYR',
        content_name: '3DCartoonAI System',
        content_ids: ['3DCARTOON-AI-001'],
        content_type: 'product'
      });

}



else{


document.getElementById("title")
.innerHTML =
"Payment Tidak Berjaya";


document.getElementById("title")
.className="fail";


document.getElementById("msg")
.innerHTML =
`
Pembayaran belum berjaya.

Sila cuba semula.
`;

}



</script>
