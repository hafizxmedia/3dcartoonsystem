<!DOCTYPE html>

<html>

<head>

<title>Payment Status</title>


<style>

body{
font-family:Arial;
text-align:center;
padding:80px;
background:#0f1420;
color:white;
}

.box{
background:#171f32;
padding:40px;
border-radius:20px;
max-width:500px;
margin:auto;
}

.success{
color:#00f2ea;
}

.fail{
color:#ff2d55;
}

</style>


</head>


<body>


<div class="box">


<h1 id="title">
Memeriksa pembayaran...
</h1>


<p id="msg"></p>


</div>



<script>


const params =
new URLSearchParams(
window.location.search
);


const status =
params.get("status_id");



if(status==="1"){


document.getElementById("title")
.innerHTML =
"Payment Berjaya 🎉";


document.getElementById("title")
.className="success";


document.getElementById("msg")
.innerHTML =
`
Terima kasih atas pembelian anda.

<br><br>

Link akses telah dihantar melalui email ToyyibPay.

<br><br>

Sila check folder inbox atau spam.
<br><br>

Boleh hubungi admin di haafizxmedia@gmail.com jika ada sebarang pertanyaan.
`;


}



else{


document.getElementById("title")
.innerHTML =
"Payment Tidak Berjaya";


document.getElementById("title")
.className="fail";


document.getElementById("msg")
.innerHTML =
`
Pembayaran belum berjaya.

Sila cuba semula.
`;

}



</script>


</body>

</html>
